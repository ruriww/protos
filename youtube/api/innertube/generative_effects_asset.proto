edition = "2023";

package youtube.api.innertube;

import "youtube/api/innertube/effect_asset.proto";
import "youtube/api/innertube/image_to_video_params.proto";

option java_package = "com.google.protos.youtube.api.innertube";
option java_multiple_files = true;
option cc_enable_arenas = true;
option objc_class_prefix = "YTI";

message GenerativeEffectsAsset {
	EffectAsset effect_asset = 1;
	ImageToVideoParams i2v_params = 2;
	bytes input_image = 3;
	int32 preset_prompt_id = 4;
	string effect_asset_id = 5;
	string effect_asset_logging_id = 6;
}
